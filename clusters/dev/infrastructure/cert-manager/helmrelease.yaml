apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager

spec:
  interval: 1h

  install:
    createNamespace: true

  chart:
    spec:
      chart: cert-manager
      version: "v1.18.2"

      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: flux-system

  values:
    crds:
      enabled: true
    extraArgs:
      - --enable-gateway-api