apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system
spec:
  interval: 1h
  install:
    createNamespace: true

  chartRef:
    kind: OCIRepository
    name: envoy-gateway
    namespace: flux-system

  values:
    config:
      envoyGateway:
        logging:
          level:
            default: info