apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
  namespace: envoy-gateway-system

spec:
  interval: 1h

  install:
    createNamespace: true
    crds: Skip

  upgrade:
    crds: Skip

  chartRef:
    kind: OCIRepository
    name: envoy-gateway
    namespace: flux-system

  values:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi

  config:
    envoyGateway:
      logging:
        level:
          default: info